name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  oss-boundary:
    name: OSS Boundary Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check OSS export boundary
        run: make oss-check

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: oss-boundary
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
