name: Deploy Docs to GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the built docs to GitHub Pages"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: manor-ai-docs-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json

      - name: Install and build docs
        working-directory: docs-site
        run: |
          npm ci
          npm run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: manor-ai-docs-${{ github.sha }}
          path: docs-site/build
          retention-days: 7

      - name: Deploy docs
        if: ${{ github.event_name == 'push' || inputs.publish == true }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_ACCESS_TOKEN }}
          external_repository: manor-os/manor-os.github.io
          publish_branch: main
          publish_dir: docs-site/build
          destination_dir: docs/manor-ai
          keep_files: true
