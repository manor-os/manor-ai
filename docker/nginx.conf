# Map http_upgrade → Connection header. When the client requests a
# WebSocket upgrade, send "upgrade"; otherwise send empty (so this
# header doesn't leak into normal HTTP requests). Required for
# /api/* locations that serve BOTH regular HTTP and WS endpoints
# (e.g. headed-login at /api/v1/integrations/headed-login/{sid}/stream).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker Compose service IPs can change when the API container is
    # recreated during deploys. Using Docker's embedded DNS plus a variable
    # upstream forces Nginx to re-resolve `api` instead of pinning the old IP
    # until the web container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8000;

    client_max_body_size 500m;
    # Keep routine API POST bodies, like worker heartbeats, out of temp files.
    client_body_buffer_size 1m;

    # Keep SPA entry points effectively uncached so new sessions pick up the
    # latest release quickly after deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    location = /admin.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    # Build metadata used by the in-app "new version available" prompt.
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    # Fingerprinted Vite assets are safe to cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Stock nginx mime.types has no entry for `.mjs`, so it falls back to
    # `application/octet-stream`. Browsers refuse to dynamically import an
    # ES module with that MIME type, which broke the PDF.js worker
    # (`/assets/pdf.worker.min-*.mjs`) on staging-dev. Override the type
    # for .mjs explicitly. types {} would replace the inherited mime.types
    # hash entirely, so we use a location-scoped default_type instead.
    location ~* \.mjs$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        default_type application/javascript;
        try_files $uri =404;
    }

    # Admin SPA: /admin* → admin.html
    location /admin {
        try_files $uri $uri/ /admin.html;
    }

    # SPA: all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy → FastAPI backend
    location /ws {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API proxy → FastAPI backend.
    # Carries WS endpoints too (headed-login at /api/v1/integrations/
    # headed-login/{sid}/stream), so we set Upgrade/Connection headers
    # conditionally via the $connection_upgrade map at the top of this
    # file. Without these, the WS upgrade silently downgrades to plain
    # HTTP and the noVNC client closes with code 1006.
    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Config endpoint
    location /config {
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://$api_upstream;
    }
}
