<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>手作香薰买手店渠道提案</title>
<style>
:root { --accent: #2563eb; --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; }
* { box-sizing: border-box; }
body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: #f8fafc; }
.page { width: min(960px, calc(100vw - 32px)); margin: 28px auto; background: #fff; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: 0 20px 60px rgba(15, 23, 42, .08); }
.hero { padding: 28px 32px; background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 16%, #fff), #fff 62%); border-bottom: 1px solid var(--line); }
.kicker { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
h1 { margin: 8px 0 0; font-size: 32px; line-height: 1.08; letter-spacing: -0.01em; }
h2 { font-size: 18px; margin: 0 0 12px; }
p { color: var(--muted); line-height: 1.55; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 24px 32px 32px; }
.card { border: 1px solid var(--line); border-radius: 14px; padding: 16px; background: #fff; min-height: 120px; }
.card strong { display:block; font-size: 15px; margin-bottom: 8px; }
ul, ol { margin: 0; padding-left: 18px; color: var(--muted); line-height: 1.55; }
table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
th, td { border: 1px solid var(--line); padding: 10px 12px; text-align: left; }
th { background: color-mix(in srgb, var(--accent) 12%, #fff); color: var(--ink); }
.slide { min-height: 230px; border-radius: 18px; padding: 24px; background: #0f172a; color: #fff; display: flex; flex-direction: column; justify-content: space-between; }
.slide h2 { color: #fff; font-size: 25px; }
.slide p, .slide li { color: #cbd5e1; }
.timeline { padding: 24px 32px 32px; display: grid; gap: 14px; }
.step { display: grid; grid-template-columns: 72px 1fr; gap: 14px; align-items: start; }
.time { color: var(--accent); font-weight: 850; }
@media (max-width: 720px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 25px; } .page { margin: 0; width: 100%; border-radius: 0; } }
</style>
</head>
<body>
<main class="page">
<section class="hero"><div class="kicker">Slides sample</div><h1>手作香薰买手店渠道提案</h1></section><section class="grid"><section class="slide"><div class="kicker">Slide 01</div><h2>品牌故事与三款香型</h2><p>手作香薰买手店渠道提案 的实际页面样例，包含标题、证明材料和下一步 CTA。</p></section><section class="slide"><div class="kicker">Slide 02</div><h2>包装、陈列和试销方案</h2><p>手作香薰买手店渠道提案 的实际页面样例，包含标题、证明材料和下一步 CTA。</p></section><section class="slide"><div class="kicker">Slide 03</div><h2>合作条款与补货节奏</h2><p>手作香薰买手店渠道提案 的实际页面样例，包含标题、证明材料和下一步 CTA。</p></section></section>
</main>
</body>
</html>
