<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>客户交付提醒自动化</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; color: #064e3b; background: #ecfdf5; }
    main { max-width: 1120px; margin: 0 auto; padding: 48px 32px 64px; }
    .hero { min-height: 330px; border-radius: 24px; padding: 42px; background: #ffffff; border: 1px solid #a7f3d0; box-shadow: 0 24px 70px rgba(15,23,42,.10); position: relative; overflow: hidden; }
    .hero:after { content: ""; position: absolute; right: -90px; top: -80px; width: 280px; height: 280px; border-radius: 50%; background: #059669; opacity: .16; }
    .eyebrow { color: #059669; font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: .08em; }
    h1 { margin: 18px 0 12px; font-size: clamp(36px, 6vw, 72px); line-height: .96; max-width: 720px; }
    .lead { max-width: 620px; color: #64748b; font-size: 18px; line-height: 1.65; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 22px; }
    .card { border-radius: 18px; padding: 20px; background: rgba(255,255,255,.78); border: 1px solid #a7f3d0; min-height: 136px; color: #064e3b; }
    .card strong { display:block; font-size: 17px; margin-bottom: 10px; }
    .card p { margin:0; color:#64748b; line-height:1.55; font-size:14px; }
    .strip { margin-top: 18px; display:flex; gap: 10px; flex-wrap: wrap; }
    .chip { border-radius:999px; padding:8px 12px; background:#059669; color:#fff; font-size:12px; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">Automation</div>
      <h1>客户交付提醒自动化</h1>
      <p class="lead">客户项目到节点前自动提醒，避免个人接单漏交付。</p>
      <div class="strip"><span class="chip">真实 sample</span><span class="chip">可直接改写</span><span class="chip">副业场景</span></div>
    </section>
    <section class="grid">客户项目到节点前自动提醒，避免个人接单漏交付。
<article class="card"><strong>里程碑</strong><p>Brief、初稿、修订、终稿。</p></article>
<article class="card"><strong>尾款</strong><p>终稿发送前检查付款。</p></article>
<article class="card"><strong>归档</strong><p>案例素材和证言请求。</p></article></section>
  </main>
</body>
</html>
