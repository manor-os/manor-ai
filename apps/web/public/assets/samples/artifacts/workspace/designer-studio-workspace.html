<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>独立设计师接单工作台</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; color: #f8fafc; background: #eef2f7; }
    main { max-width: 1120px; margin: 0 auto; padding: 48px 32px 64px; }
    .hero { min-height: 330px; border-radius: 24px; padding: 42px; background: #111827; border: 1px solid #cbd5e1; box-shadow: 0 24px 70px rgba(15,23,42,.10); position: relative; overflow: hidden; }
    .hero:after { content: ""; position: absolute; right: -90px; top: -80px; width: 280px; height: 280px; border-radius: 50%; background: #38bdf8; opacity: .16; }
    .eyebrow { color: #38bdf8; font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: .08em; }
    h1 { margin: 18px 0 12px; font-size: clamp(36px, 6vw, 72px); line-height: .96; max-width: 720px; }
    .lead { max-width: 620px; color: #cbd5e1; font-size: 18px; line-height: 1.65; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 22px; }
    .card { border-radius: 18px; padding: 20px; background: rgba(255,255,255,.78); border: 1px solid #cbd5e1; min-height: 136px; color: #0f172a; }
    .card strong { display:block; font-size: 17px; margin-bottom: 10px; }
    .card p { margin:0; color:#64748b; line-height:1.55; font-size:14px; }
    .strip { margin-top: 18px; display:flex; gap: 10px; flex-wrap: wrap; }
    .chip { border-radius:999px; padding:8px 12px; background:#38bdf8; color:#fff; font-size:12px; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">Workspace</div>
      <h1>独立设计师接单工作台</h1>
      <p class="lead">从线索、报价、合同到交付沉淀，适合个人设计工作室。</p>
      <div class="strip"><span class="chip">真实 sample</span><span class="chip">可直接改写</span><span class="chip">副业场景</span></div>
    </section>
    <section class="grid">从线索、报价、合同到交付沉淀，适合个人设计工作室。
<article class="card"><strong>报价分层</strong><p>Logo refresh / social kit / brand sprint。</p></article>
<article class="card"><strong>客户状态</strong><p>询价、已报价、合同中、交付中。</p></article>
<article class="card"><strong>案例沉淀</strong><p>上线截图、客户证言、复购机会。</p></article></section>
  </main>
</body>
</html>
