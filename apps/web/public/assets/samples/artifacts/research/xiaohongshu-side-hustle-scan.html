<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小红书副业趋势扫描</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; color: #881337; background: #fff1f2; }
    main { max-width: 1120px; margin: 0 auto; padding: 48px 32px 64px; }
    .hero { min-height: 330px; border-radius: 24px; padding: 42px; background: #ffffff; border: 1px solid #fecdd3; box-shadow: 0 24px 70px rgba(15,23,42,.10); position: relative; overflow: hidden; }
    .hero:after { content: ""; position: absolute; right: -90px; top: -80px; width: 280px; height: 280px; border-radius: 50%; background: #e11d48; opacity: .16; }
    .eyebrow { color: #e11d48; font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: .08em; }
    h1 { margin: 18px 0 12px; font-size: clamp(36px, 6vw, 72px); line-height: .96; max-width: 720px; }
    .lead { max-width: 620px; color: #64748b; font-size: 18px; line-height: 1.65; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 22px; }
    .card { border-radius: 18px; padding: 20px; background: rgba(255,255,255,.78); border: 1px solid #fecdd3; min-height: 136px; color: #881337; }
    .card strong { display:block; font-size: 17px; margin-bottom: 10px; }
    .card p { margin:0; color:#64748b; line-height:1.55; font-size:14px; }
    .strip { margin-top: 18px; display:flex; gap: 10px; flex-wrap: wrap; }
    .chip { border-radius:999px; padding:8px 12px; background:#e11d48; color:#fff; font-size:12px; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">Research</div>
      <h1>小红书副业趋势扫描</h1>
      <p class="lead">对副业关键词、爆款笔记结构和评论需求做轻量研究。</p>
      <div class="strip"><span class="chip">真实 sample</span><span class="chip">可直接改写</span><span class="chip">副业场景</span></div>
    </section>
    <section class="grid">对副业关键词、爆款笔记结构和评论需求做轻量研究。
<article class="card"><strong>关键词</strong><p>AI 简历、Notion 模板、周末摆摊。</p></article>
<article class="card"><strong>爆款结构</strong><p>痛点标题、步骤截图、价格锚点。</p></article>
<article class="card"><strong>机会点</strong><p>高保存率但低转化的内容。</p></article></section>
  </main>
</body>
</html>
